<?xml version="1.0" encoding="UTF-8"?>
<!-- Profile photo PLACEHOLDER.
     Replace this file with a real square photo (recommended: 640x640 JPG/PNG)
     named profile.jpg/png, then update the <img src> in index.html. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Profile photo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1830"/>
      <stop offset="1" stop-color="#0f1622"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.5" stop-color="#27c0ff"/>
      <stop offset="1" stop-color="#2ee6a6"/>
    </linearGradient>
  </defs>

  <rect width="320" height="320" rx="18" fill="url(#bg)"/>

  <!-- Stylized avatar silhouette -->
  <circle cx="160" cy="128" r="52" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.9"/>
  <circle cx="160" cy="120" r="34" fill="#2a2a44"/>
  <path d="M96 250c0-40 28-66 64-66s64 26 64 66" fill="#2a2a44"/>

  <!-- Initials -->
  <text x="160" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="16" fill="#8a8da6" letter-spacing="1">PRASANTH CHINTAPALLI</text>

  <!-- Decorative network dots -->
  <g fill="#7c5cff" opacity="0.5">
    <circle cx="40" cy="48" r="3"/><circle cx="282" cy="60" r="3"/>
    <circle cx="60" cy="210" r="2.5"/><circle cx="270" cy="200" r="2.5"/>
  </g>
</svg>
